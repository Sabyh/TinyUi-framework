<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My List</title>
  <link rel="stylesheet" href="/src/css/style.css">
  <script type="module" src="/src/main.ts" defer></script>
</head>

<body>
  <main>
    <div class="globalCounter">
      <button id="counterButton" class="button">Count is 0</button>
    </div>
    <h1 class="offscreen">My List</h1>

    <section class="newItemEntry">
      <h2 class="offscreen">New Item Entry</h2>
      <form class="newItemEntry__form" id="itemEntryForm">
        <label for="newItem" class="offscreen">Enter a new to do item</label>
        <input class="newItemEntry__input" id="newItem" type="text" maxlength="40" autocomplete="off"
          placeholder="Add item" />
        <button id="addItem" class="button newItemEntry__button" title="Add new item" aria-label="Add new item to list">
          +
        </button>
      </form>
    </section>

    <section id="notesPanel" class="notesPanel">
      <header class="notesTitle">
        <h2>Notes</h2>
      </header>
      <form class="notesEntry__form" id="noteEntryForm">
        <input class="notesEntry__input" id="newNoteTitle" type="text" maxlength="50" autocomplete="off"
          placeholder="Note title" />
        <textarea class="notesEntry__textarea" id="newNoteBody" maxlength="200"
          placeholder="Note content"></textarea>
        <button id="addNote" class="button notesEntry__button" type="submit" title="Add new note" aria-label="Add new note">
          Add Note
        </button>
      </form>
      <ul id="noteItems" class="noteItems"></ul>
    </section>

    <section class="listContainer">
      <header class="listTitle">
        <h2 id="listName">List</h2>
        <button id="clearItemsButton" class="button listTitle__button" title="Clear the list"
          aria-label="Remove all items from the list">
          Clear
        </button>
      </header>

      <div class="listControls">
        <div class="listControls__count" id="itemCount" aria-live="polite">
          <span id="totalCount">0</span> items • <span id="activeCount">0</span> active
        </div>
        <div class="listControls__filters" role="group" aria-label="Filter list items">
          <button id="showAll" class="button filterButton" type="button">All</button>
          <button id="showActive" class="button filterButton" type="button">Active</button>
          <button id="showCompleted" class="button filterButton" type="button">Completed</button>
        </div>
      </div>

      <hr />
<ul id="listItems" class="listItems">
        <!-- <li class="item">
                    <input type="checkbox" id="1">
                    <label for="1">eat</label>
                    <button class="button">X</button>
                </li>
                <li class="item">
                    <input type="checkbox" id="2">
                    <label for="2">sleep</label>
                    <button class="button">X</button>
                </li>
                <li class="item">
                    <input type="checkbox" id="3">
                    <label for="3">code</label>
                    <button class="button">X</button>
                </li> -->
      </ul>
    </section>
  </main>
</body>

</html>
